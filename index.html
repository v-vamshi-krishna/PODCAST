<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PodcastHub — Conversations That Matter</title>
  <meta name="description" content="Weekly deep-dives with the people shaping technology, culture, and ideas.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo" onclick="goHome(event)">Podcast<span>Hub</span></div>
  <ul class="nav-links">
    <li><a href="#" onclick="goHome(event)">Home</a></li>
    <li><a href="#" onclick="goEpisodes(event)">Episodes</a></li>
    <li><a href="#" onclick="goAbout(event)">About</a></li>
  </ul>
  <button class="nav-search-btn" onclick="goSearch(event)">Search episodes</button>
</nav>

<!-- HOME -->
<div id="page-home" class="page active">
  <!-- KEEP YOUR ORIGINAL CONTENT HERE -->
</div>

<!-- EPISODES -->
<div id="page-episodes" class="page">
  <!-- KEEP YOUR ORIGINAL CONTENT HERE -->
</div>

<!-- EPISODE DETAIL -->
<div id="page-episode-detail" class="page"></div>

<!-- SEARCH -->
<div id="page-search" class="page"></div>

<!-- ABOUT -->
<div id="page-about" class="page">
  <!-- KEEP YOUR ORIGINAL CONTENT HERE -->
</div>

<!-- FOOTER -->
<footer>
  <!-- KEEP YOUR ORIGINAL FOOTER -->
</footer>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- JS -->
<script src="js/app.js"></script>

<!-- ✅ SAFETY NAVIGATION SCRIPT (NEW - IMPORTANT) -->
<script>
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById(pageId);
  if (page) page.classList.add('active');
}

function goHome(e) {
  if (e) e.preventDefault();
  showPage('page-home');
}

function goEpisodes(e) {
  if (e) e.preventDefault();
  showPage('page-episodes');
}

function goAbout(e) {
  if (e) e.preventDefault();
  showPage('page-about');
}

function goSearch(e) {
  if (e) e.preventDefault();
  showPage('page-search');
}
</script>

</body>
</html>
